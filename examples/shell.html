<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>raylib-backends - WebGPU (rlwg)</title>
  <style>
    html, body { margin: 0; padding: 0; background: #12121a; color: #ddd; font-family: monospace; }
    #wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 12px; }
    canvas { background: #000; display: block; border: 1px solid #333; }
    #log { width: 960px; max-width: 95vw; height: 96px; overflow: auto; font-size: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="canvas" width="960" height="540" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="log"></div>
  </div>
  <script>
    if (!navigator.gpu) {
      document.getElementById('log').textContent =
        'WebGPU not available in this browser. Use a recent Chrome/Edge/Firefox-nightly with WebGPU enabled.';
    }
    var Module = {
      canvas: (function() { return document.getElementById('canvas'); })(),
      print: function(text) {
        var el = document.getElementById('log');
        el.textContent += text + '\n';
        el.scrollTop = el.scrollHeight;
      },
      printErr: function(text) { Module.print('[err] ' + text); }
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
